<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pourquoi ce départ ? • Camille v2.0</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="confetti"></canvas>

  <header class="topbar">
    <div class="topbarInner">
      <div class="badge"><span class="dot"></span><div><div style="font-weight:750;font-size:13px;">Pull Request</div><div class="small">Camille v2.0</div></div></div>
      <div class="progressWrap"><div class="progress"><span></span></div><div class="stepLabel">Step</div></div>
      <div class="badge"><div class="small">Hint</div><div style="font-weight:750;font-size:13px;">← / →</div></div>
    </div>
  </header>

  <main class="container">
    <section class="card" style="padding:22px;" data-animate>
      <h2># Pourquoi ce départ ?</h2>
      <p>Après observation du système actuel, il apparaît :</p>
      <ul>
        <li>Pas assez de soleil</li>
        <li>Manque de balade à cheval au bord de mer</li>
        <li>Pas assez de flament rose</li>
      </ul>

      <div class="panel" data-animate>
        <h3>Proposition technique</h3>
        <div class="codebox">
          <div><span class="muted">Remède</span> ⇒ <b>Partir dans le Sud !</b></div>
          <div><span class="muted"></span>      </div>
          <div><span class="muted"></span>      </div>
        </div>
      </div>

      <div class="footerNav">
        <button class="btn ghost" data-prev>← Précédent</button>
        <button class="btn" data-next>Suivant →</button>
      </div>
    </section>
  </main>

  <div id="toast" class="toast"></div>
  <script src="app.js"></script>
</body>
</html>
